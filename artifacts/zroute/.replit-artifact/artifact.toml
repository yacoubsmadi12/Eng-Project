kind = "web"
previewPath = "/"
title = "Z Route Master"
version = "1.0.0"
id = "artifacts/zroute"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26227

[services.development]
run = "pnpm --filter @workspace/zroute run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zroute", "run", "build" ]
publicDir = "artifacts/zroute/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26227"
BASE_PATH = "/"
